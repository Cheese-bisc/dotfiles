general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display
    inhibit_sleep = 3                                      # wait until screen is locked
}

listener {
    timeout = 150                                              # 2.5min
    on-timeout = pidof hyprlock || omarchy-launch-screensaver  # start screensaver (if not locked already)
}

listener {
    timeout = 600                                            # 10min
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0  # turn off keyboard backlight
    on-resume = brightnessctl -rd '*::kbd_backlight'         # restore keyboard backlight
}

listener {
    timeout = 900                      # 15min
    on-timeout = loginctl lock-session # lock screen
}

listener {
    timeout = 1500                                           # 25min
    on-timeout = hyprctl dispatch dpms off                   # screen off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r # screen on + restore brightness
}
